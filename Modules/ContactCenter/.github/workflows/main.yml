name: Create Release and Upload to Keygen

on:
  push:
    tags:
      - 'v*'   # This triggers the workflow for tags that start with "v"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Release on GitHub
        uses: softprops/action-gh-release@v2.0.7
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Parse Version from Tag (remove 'v' prefix)
        id: parse_version
        run: |
          # Strip the 'v' prefix from the version
          version=${GITHUB_REF#refs/tags/}
          version=${version#v}
          echo "Parsed version: $version"

          # Save the version to be used in subsequent steps
          echo "VERSION=$version" >> $GITHUB_ENV

      - name: Create Release on Keygen
        id: create_keygen_release
        run: |
          # Generate a unique tag using md5sum of the version
          unique_tag=$(echo -n "$VERSION" | md5sum | awk '{ print $1 }')
          echo $unique_tag
          
          # Create a release on Keygen using the correct endpoint
          response=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST https://api.keygen.sh/v1/accounts/${{ secrets.KEYGEN_ACCOUNT_ID }}/releases \
            -H 'Authorization: Bearer ${{ secrets.KEYGEN_API_TOKEN }}' \
            -H 'Content-Type: application/vnd.api+json' \
            -H 'Accept: application/vnd.api+json' \
            -d '{
              "data": {
                "type": "release",
                "attributes": {
                  "name": "CONTACT_CENTER_MODULE",
                  "version": "'$VERSION'",
                  "channel": "stable",
                  "tag": "'$unique_tag'"
                },
                "relationships": {
                  "product": {
                    "data": {
                      "type": "product",
                      "id": "'${{ secrets.KEYGEN_PRODUCT_ID }}'"
                    }
                  }
                }
              }
            }')

          # Extract the status and response body
          http_status=$(echo "$response" | tail -n 1 | sed -e 's/HTTP_STATUS://')
          response_body=$(echo "$response" | sed '$d')

          # Output full response and status for debugging
          echo "HTTP Status: $http_status"
          echo "Response Body: $response_body"

          if [[ "$http_status" -ne 201 ]]; then
            echo "Error: Failed to create release on Keygen."
            echo "Detailed Error: $response_body"
            exit 1
          fi

          # Extract the release ID from the response
          release_id=$(echo $response_body | jq -r '.data.id')
          if [[ -z "$release_id" || "$release_id" == "null" ]]; then
            echo "Error: Invalid release ID returned from Keygen."
            exit 1
          fi

          echo "RELEASE_ID=$release_id" >> $GITHUB_ENV


      - name: Get GitHub Release Tarball URL
        if: success()
        id: get_github_release
        run: |
          # Fetch the release details from GitHub
          response=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ github.ref_name }})

          # Extract the tarball URL
          tarball_url=$(echo $response | jq -r '.tarball_url')
          if [[ -z "$tarball_url" || "$tarball_url" == "null" ]]; then
            echo "Error: Failed to get tarball URL."
            exit 1
          fi

          echo "TARBALL_URL=$tarball_url" >> $GITHUB_ENV

      - name: Download GitHub Release Tarball
        if: success()
        run: |
          # Download the tarball from the GitHub release
          curl -L -o release.tar.gz -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" "$TARBALL_URL"


      - name: Upload Tarball Metadata to Keygen
        if: success()
        id: upload_artifact_metadata
        run: |
          filesize=$(stat -c%s "release.tar.gz")
          artifact_filename="fspbx-contact-module-${VERSION}.tar.gz"

          # Upload artifact metadata to Keygen to get the redirect URL
          response=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST https://api.keygen.sh/v1/accounts/${{ secrets.KEYGEN_ACCOUNT_ID }}/artifacts \
            -H 'Authorization: Bearer ${{ secrets.KEYGEN_API_TOKEN }}' \
            -H 'Content-Type: application/vnd.api+json' \
            -H 'Accept: application/vnd.api+json' \
            -H 'Prefer: no-redirect' \
            -d '{
              "data": {
                "type": "artifact",
                "attributes": {
                  "filename": "'"$artifact_filename"'",
                  "filesize": '"$filesize"',
                  "filetype": "tar.gz",
                  "platform": "linux",
                  "arch": "amd64"
                },
                "relationships": {
                  "release": {
                    "data": {
                      "type": "release",
                      "id": "'"$RELEASE_ID"'"
                    }
                  }
                }
              }
            }')

          # Extract the status and response body
          http_status=$(echo "$response" | tail -n 1 | sed -e 's/HTTP_STATUS://')
          response_body=$(echo "$response" | sed '$d')  # Remove the HTTP status line

          # Output full response and status for debugging
          echo "HTTP Status: $http_status"
          echo "Response Body: $response_body"

          if [[ "$http_status" -ne 200 ]]; then
            echo "Error: Failed to upload artifact metadata to Keygen."
            echo "Detailed Error: $response_body"
            exit 1
          fi

          # Extract the redirect URL from the response
          redirect_url=$(echo $response_body | jq -r '.data.links.redirect')
          echo "------"
          echo "Extracted Redirect URL: $redirect_url"
          echo "------"
          if [[ -z "$redirect_url" || "$redirect_url" == "null" ]]; then
            echo "Error: Invalid redirect URL returned from Keygen."
            exit 1
          fi

          # Save the redirect URL and formatted filename for the next step
          echo "REDIRECT_URL=$redirect_url" >> $GITHUB_ENV
          echo "ARTIFACT_FILENAME=$artifact_filename" >> $GITHUB_ENV

          
      - name: Upload Tarball to Keygen
        if: success()
        run: |
          mv release.tar.gz $ARTIFACT_FILENAME
          
          # Upload the tarball to the upload URL provided by Keygen
          curl -X PUT -T $ARTIFACT_FILENAME "$REDIRECT_URL"


      - name: Publish Keygen Release
        if: success()
        run: |
          curl -X POST https://api.keygen.sh/v1/accounts/${{ secrets.KEYGEN_ACCOUNT_ID }}/releases/$RELEASE_ID/actions/publish \
            -H 'Accept: application/vnd.api+json' \
            -H 'Authorization: Bearer ${{ secrets.KEYGEN_API_TOKEN }}'
